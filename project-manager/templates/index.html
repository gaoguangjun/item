<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目管理器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>项目管理器</h1>
            <div class="scan-info">
                <span id="scan-dir">扫描目录: 加载中...</span>
                <button id="refresh-btn" class="btn btn-primary">
                    <span class="icon">↻</span> 刷新
                </button>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="dashboard">
                <span class="icon">📊</span> 仪表板
            </button>
            <button class="tab-btn" data-tab="services">
                <span class="icon">🚀</span> 服务面板
            </button>
            <button class="tab-btn" data-tab="projects">
                <span class="icon">📁</span> 项目
            </button>
            <button class="tab-btn" data-tab="favorites">
                <span class="icon">⭐</span> 收藏
            </button>
            <button class="tab-btn" data-tab="sysprocesses">
                <span class="icon">⚡</span> 系统进程
            </button>
            <button class="tab-btn" data-tab="software">
                <span class="icon">💻</span> 软件
            </button>
            <button class="tab-btn" data-tab="settings">
                <span class="icon">⚙️</span> 设置
            </button>
        </nav>

        <main>
            <!-- 服务面板 -->
            <section id="services-panel" class="panel">
                <div id="services-grid" class="services-grid"></div>
            </section>

            <!-- 项目面板 -->
            <section id="projects-panel" class="panel active">
                <div class="search-bar">
                    <input type="text" id="project-search" placeholder="搜索项目...">
                    <select id="type-filter">
                        <option value="">全部类型</option>
                        <option value="python">Python</option>
                        <option value="node">Node.js</option>
                        <option value="java">Java</option>
                        <option value="go">Go</option>
                        <option value="git">Git</option>
                        <option value="generic">其他</option>
                    </select>
                </div>
                <div id="projects-list" class="item-list">
                    <div class="loading">加载中...</div>
                </div>
            </section>

            <!-- 系统进程面板 -->
            <section id="sysprocesses-panel" class="panel">
                <div class="search-bar">
                    <input type="text" id="sysproc-search" placeholder="搜索进程...">
                    <select id="sysproc-type-filter">
                        <option value="">全部类型</option>
                        <option value="Python">Python</option>
                        <option value="Node.js">Node.js</option>
                        <option value="Java">Java</option>
                        <option value="Go">Go</option>
                        <option value=".NET">.NET</option>
                    </select>
                </div>
                <div class="sysproc-list" id="sysproc-list">
                    <div class="loading">加载中...</div>
                </div>
            </section>

            <!-- 软件面板 -->
            <section id="software-panel" class="panel">
                <div class="search-bar">
                    <input type="text" id="software-search" placeholder="搜索软件...">
                </div>
                <div id="software-list" class="item-list">
                    <div class="loading">加载中...</div>
                </div>
            </section>

            <!-- 仪表板面板 -->
            <section id="dashboard-panel" class="panel">
                <div class="dashboard-stats">
                    <div class="stat-card">
                        <div class="stat-icon">📁</div>
                        <div class="stat-info">
                            <div class="stat-value" id="stat-total">0</div>
                            <div class="stat-label">总项目数</div>
                        </div>
                    </div>
                    <div class="stat-card running">
                        <div class="stat-icon">▶️</div>
                        <div class="stat-info">
                            <div class="stat-value" id="stat-running">0</div>
                            <div class="stat-label">运行中</div>
                        </div>
                    </div>
                    <div class="stat-card stopped">
                        <div class="stat-icon">⏹</div>
                        <div class="stat-info">
                            <div class="stat-value" id="stat-stopped">0</div>
                            <div class="stat-label">已停止</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💾</div>
                        <div class="stat-info">
                            <div class="stat-value" id="stat-size">0 MB</div>
                            <div class="stat-label">总大小</div>
                        </div>
                    </div>
                </div>

                <div class="dashboard-sections">
                    <div class="dashboard-section">
                        <h3>项目类型分布</h3>
                        <div id="type-distribution" class="type-distribution">
                            <div class="loading">加载中...</div>
                        </div>
                    </div>
                    <div class="dashboard-section">
                        <h3>批量操作</h3>
                        <div class="batch-actions">
                            <button class="btn btn-success" id="batch-start-all">
                                <span class="icon">▶️</span> 启动所有
                            </button>
                            <button class="btn btn-warning" id="batch-stop-all">
                                <span class="icon">⏹</span> 停止所有
                            </button>
                            <button class="btn btn-primary" id="batch-refresh">
                                <span class="icon">↻</span> 刷新状态
                            </button>
                        </div>
                    </div>
                </div>

                <div class="dashboard-section">
                    <h3>最近访问</h3>
                    <div id="recent-projects" class="item-list">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </section>

            <!-- 收藏面板 -->
            <section id="favorites-panel" class="panel">
                <div class="search-bar">
                    <input type="text" id="favorites-search" placeholder="搜索收藏...">
                </div>
                <div id="favorites-list" class="item-list">
                    <div class="empty-state">
                        <span class="icon">⭐</span>
                        <p>暂无收藏项目</p>
                    </div>
                </div>
            </section>

            <!-- 设置面板 -->
            <section id="settings-panel" class="panel">
                <div class="settings-container">
                    <div class="setting-group">
                        <h3>扫描设置</h3>
                        <div class="setting-item">
                            <label>扫描目录</label>
                            <input type="text" id="setting-root-path" placeholder="输入要扫描的目录路径">
                            <button class="btn btn-primary" id="save-root-path">保存</button>
                        </div>
                        <div class="setting-item">
                            <label>刷新间隔 (秒)</label>
                            <input type="number" id="setting-refresh-interval" min="1" max="60" value="5">
                            <button class="btn btn-primary" id="save-refresh-interval">保存</button>
                        </div>
                    </div>
                    <div class="setting-group">
                        <h3>外观设置</h3>
                        <div class="setting-item">
                            <label>主题</label>
                            <select id="setting-theme">
                                <option value="dark">深色</option>
                                <option value="light">浅色</option>
                            </select>
                            <button class="btn btn-primary" id="save-theme">保存</button>
                        </div>
                    </div>
                    <div class="setting-group">
                        <h3>数据管理</h3>
                        <button class="btn btn-secondary" id="export-config">
                            <span class="icon">📤</span> 导出配置
                        </button>
                        <button class="btn btn-secondary" id="import-config">
                            <span class="icon">📥</span> 导入配置
                        </button>
                        <button class="btn btn-danger" id="reset-config">
                            <span class="icon">🔄</span> 重置配置
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <!-- 详情弹窗 -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">项目详情</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body" id="modal-body">
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
